<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津川晃一AI - Console</title>
    <style>
        :root { --bg: #ffffff; --text: #1f1f1f; --accent: #1a73e8; }
        body { font-family: 'Google Sans', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; background: var(--bg); }
        #app { width: 100%; max-width: 800px; display: flex; flex-direction: column; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; font-size: 1.2rem; font-weight: 500; }
        #log { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 25px; }
        .row { display: flex; gap: 15px; }
        .user-row { flex-direction: row-reverse; }
        .icon { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .u-icon { background: var(--accent); color: white; font-size: 0.8rem; }
        .a-icon { background: #eee; }
        .icon img { width: 100%; height: 100%; object-fit: cover; }
        .bubble { line-height: 1.6; font-size: 16px; white-space: pre-wrap; }
        footer { padding: 20px 10%; }
        .box { background: #eff3f9; border-radius: 30px; padding: 10px 24px; display: flex; align-items: center; }
        input { flex: 1; background: none; border: none; outline: none; padding: 10px; font-size: 16px; }
        button { background: none; border: none; cursor: pointer; color: #444746; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="app">
    <header>津川晃一AI</header>
    <div id="log"></div>
    <footer>
        <div class="box">
            <input type="text" id="in" placeholder="メッセージを入力..." autocomplete="off">
            <button id="btn">➤</button>
        </div>
    </footer>
</div>

<script>
    const log = document.getElementById('log');
    const input = document.getElementById('in');
    const btn = document.getElementById('btn');

    // 直前の発言を記録する変数
    let lastUserMessage = "";

    const charts = [
        // --- 特別ルール：114514の後に「来いよ」系 ---
        { 
            condition: (v) => lastUserMessage.includes("114514") && (v.includes("来いよ") || v.includes("こいよ")), 
            resp: "おまえんちくっけんなぁ？" 
        },
        // --- 拡張辞書セリフ群 ---
        { keys: ["取った", "ば返せば"], resp: "なんさまそのkくんから取ったやつば返せばいいとやぁ" },
        { keys: ["もしもし", "もしもーし"], resp: "もし↑もーし⇩" },
        { keys: ["おーい", "お〜い"], resp: "お〜い" },
        { keys: ["うるさい", "ミュート"], resp: "ジジイがうるさいのでミュート" },
        { keys: ["ごらぁ", "ごらあ"], resp: "{*?+ごらぁあ" },
        { keys: ["先生", "話すぞ"], resp: "お前先生とかお前んちの家とか全部含めてから話すぞ" },
        { keys: ["調子乗んな", "こないだ"], resp: "お前らこないだも言ったろがあんま調子乗んなよて" },
        { keys: ["意味わかる", "意味わかるや"], resp: "意味わかるや？" },
        { keys: ["大人なめんな", "こら"], resp: "大人なめんなよ、お前ら。こら" },
        { keys: ["はよせんか", "はよしろ"], resp: "はよせんか" },
        { keys: ["名前", "差しより"], resp: "友達の名前お前も差しよりはよ終わらせろ" },
        { keys: ["終わっただろ", "終わったどろうが"], resp: "もうすぐ終わったどろうが" },
        { keys: ["トラブル", "なんか最近"], resp: "お前らなんか最近いろいろトラブルば持ってきようばってん" },
        { keys: ["しっとっとやぞ", "親知っと"], resp: "お前んちの親しっとっとやぞ。全部。知っとっとや。" },
        { keys: ["あ？", "あー？"], resp: "あ？" },
        { keys: ["line", "LINE"], resp: "lineのトラブルとかもいろいろあったろうが最近" },
        { keys: ["知っとや", "全部"], resp: "お前んちの親知っとや、全部" },
        { keys: ["まだ？", "まだぁ", "ごはん"], resp: "まだ？待っとってた。ずっと" },
        { keys: ["今何個", "何個や"], resp: "で。今何個や？はよせろ" },
        { keys: ["暇じゃなかった", "暇"], resp: "暇じゃなかったぞ、こら" },
        { keys: ["ちょっとっていつまで"], resp: "お前らのちょっとっていつまでやぁ" },
        { keys: ["終わったんやぁ", "終わったいや"], resp: "終わったんやぁ？終わったいや？お前に聞きよるとばｇふ" },
        { keys: ["おいお前ら"], resp: "おいお前らもう終わったんだろぉ？" },
        { keys: ["問題持ってきたら", "次なんか"], resp: "お前ら次なんか問題持ってきたら、お前んちくっけんなぁ？" },
        { keys: ["親に", "しっかり管理"], resp: "親にも入っとケェ！！しっかり管理してくださいってぇ！！分かったかぁ？" },
        
        // --- 既存の基本ルール ---
        { keys: ["名言"], resp: "俺の名言はおまえんちくっけんなだぞ？大人なめんなよ。" },
        { keys: ["バナナ", "おやつ"], resp: "バナナはおやつじゃねえよ。果実だ。大人なめんなよ。" },
        { keys: ["114514", "いいよこいよ"], resp: "荒尾市桜山町1丁目12-6に来てやろうか？？" }
    ];

    function add(txt, isU) {
        const r = document.createElement('div');
        r.className = `row ${isU ? 'user-row' : ''}`;
        const iconHTML = isU 
            ? `<div class="icon u-icon">U</div>` 
            : `<div class="icon a-icon"><img src="ico.jpg" onerror="this.parentElement.innerHTML='津'"></div>`;
        r.innerHTML = `${iconHTML}<div class="bubble">${txt}</div>`;
        log.appendChild(r);
        log.scrollTop = log.scrollHeight;
    }

    function getResp(val) {
        // 条件付きルールの判定
        const specialHit = charts.find(c => c.condition && c.condition(val));
        if (specialHit) return specialHit.resp;

        // キーワード検索
        const hit = charts.find(c => c.keys && c.keys.some(k => val.includes(k)));
        return hit ? hit.resp : "あ？何言ってんだ？";
    }

    function send() {
        const v = input.value.trim();
        if(!v) return;
        add(v, true);
        
        setTimeout(() => {
            const reply = getResp(v);
            add(reply, false);
            // ユーザーの発言を「直前の発言」として保存
            lastUserMessage = v;
        }, 600);
        
        input.value = '';
    }

    btn.onclick = send;
    input.onkeypress = (e) => { if (e.key === 'Enter') send(); };
</script>

</body>
</html>
